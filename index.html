<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pfp-Cut</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bg.css">
  <link rel="stylesheet" href="css/switch.css">
  <link rel="stylesheet" href="css/slider.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="icon" type="image/x-icon" href="src/cut.png">
</head>
<body>
  <img src="src/bg_img_light.png" class="bg" id="bg-img">
  <!-- MENU DE CONFIGURAÇÕES -->
  <div class="gear" id="gear">
    <svg fill="#fff" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="40px" height="40px" viewBox="0 0 124 124" xml:space="preserve">
    <g>
      <path d="M9.3,47H6c-3.3,0-6,2.9-6,6.2v18C0,74.6,2.7,77,6,77h3.4c5.4,0,8.7,7.9,4.8,11.8L12,91c-2.4,2.3-2.4,6.2,0,8.5l12.6,12.7 c2.3,2.3,6.1,2.3,8.5,0l3.7-3.7c3.8-3.8,10.2-1.1,10.2,4.3v5.4c0,3.3,2.7,5.8,6,5.8h18c3.3,0,6-2.4,6-5.8v-5.4 c0-5.3,6.5-8,10.2-4.2l3.7,3.7c2.3,2.3,6.1,2.3,8.5,0L112,99.7c2.4-2.4,2.3-6.2,0-8.5l-2.2-2.3C105.9,85.1,109.2,77.1,114.6,77.1 h3.4c3.3,0,6-2.399,6-5.8v-18c0-3.3-2.7-6.2-6-6.2h-3.3c-5.4,0-8.8-8.1-5-11.9l2.399-2.3c2.301-2.3,2.301-6.1,0-8.4L99.5,11.9 c-2.4-2.4-6.2-2.3-8.5,0L88.6,14C84.8,17.9,77,14.7,77,9.2v-3C77,2.9,74.3,0,71,0H53c-3.3,0-6,2.9-6,6.2v3c0,5.5-7.8,8.7-11.6,4.8 l-2.3-2.3c-2.3-2.4-6.2-2.4-8.5,0L11.9,24.4c-2.3,2.3-2.3,6.1,0,8.5l2.4,2.2C18.1,38.9,14.7,47,9.3,47z M62.2,38.2 c13.3,0,24,10.7,24,24c0,13.3-10.7,24-24,24c-13.3,0-24-10.7-24-24C38.2,48.9,49,38.2,62.2,38.2z"/>
      </g>
    </svg>
  </div>

  <div class="menu" id="menu">
    <section class="switch-section">
      <label for="switchtema">Tema</label>
      <div class="switch-wrap">
        <input type="checkbox" id="switchtema" class="switch-input" />
        <label for="switchtema" class="switch" title="Alternar entre tema claro e escuro"></label>
      </div>
    </section>
    <section class="switch-section">
      <label for="switchround">Arredondar</label>
      <div class="switch-wrap">
        <input type="checkbox" id="switchround" class="switch-input" />
        <label for="switchround" class="switch" title="Alternar entre imagem redonda e quadrada"></label>
      </div>
    </section>
    <section class="switch-section">
      <label for="renametext">Renomear</label>
        <input type="text" id="renametext" class="text-input" placeholder="usar titulo original" title="Deixe vazio para usar o nome original da imagem"/>
    </section>
    <section class="switch-section">
      <label for="res-out">Resolução de saida</label>
        <input type="number" id="res-out" class="text-input" value="1024" placeholder="padrão: 1024px" title="Selecione a resolução de saída"/>
    </section>
  </div>

  <!-- CONTROLES -->
  <div class="perfil-container">
    <img class="img-perfil" id="foto-perfil" src="src/pfp-blank.jpg" alt="Foto de Perfil"/>
    <div class="btnsimg">
      <button type="button" class="ajustar-img">Ajustar imagem</button>

      <form method="POST" action="/uploadFoto" class="perfil-form">
        <input type="hidden" id="fotoUsuario" name="fotoUsuario">
        <div class="btns-save">
          <button id="save-img-png" type="button" class="salvarIMG esq">Baixar .png</button>
          <button id="save-img-bmp" type="button" class="salvarIMG dir">Baixar .bmp</button>
        </div>
      </form>
    </div>
  </div>

  <!-- POPUP DO CANVAS -->
  <div class="hidden popup-container">
    <div id="canvas">
      <canvas id="image-canvas" style="height: 100%; width: 100%; border-radius: 1em; box-shadow: 0 4px 8px rgb(0 0 0 / 10%); background-color: #0000004f;"></canvas>
    </div>
    <button id="close-button">
      <svg fill="#ffffff" height="21px" width="21px" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 460.775 460.775" xml:space="preserve">
        <path d="M285.08,230.397L456.218,59.27c6.076-6.077,6.076-15.911,0-21.986L423.511,4.565c-2.913-2.911-6.866-4.55-10.992-4.55 c-4.127,0-8.08,1.639-10.993,4.55l-171.138,171.14L59.25,4.565c-2.913-2.911-6.866-4.55-10.993-4.55 c-4.126,0-8.08,1.639-10.992,4.55L4.558,37.284c-6.077,6.075-6.077,15.909,0,21.986l171.138,171.128L4.575,401.505  c-6.074,6.077-6.074,15.911,0,21.986l32.709,32.719c2.911,2.911,6.865,4.55,10.992,4.55c4.127,0,8.08-1.639,10.994-4.55 l171.117-171.12l171.118,171.12c2.913,2.911,6.866,4.55,10.993,4.55c4.128,0,8.081-1.639,10.992-4.55l32.709-32.719 c6.074-6.075,6.074-15.909,0-21.986L285.08,230.397z"/>
      </svg>
    </button>
    <input type="range" id="slider" min="100" max="670" value="670" step="10">
    <div id="buttons">
      <input type="file" id="input-field" accept=".png,.jpg,.jpeg">
      <label class="custom-file-upload" id="customButton" title="Buscar imagem para recorte"> 
        <svg width="31px" height="31px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8.2C3 7.07989 3 6.51984 3.21799 6.09202C3.40973 5.71569 3.71569 5.40973 4.09202 5.21799C4.51984 5 5.0799 5 6.2 5H9.67452C10.1637 5 10.4083 5 10.6385 5.05526C10.8425 5.10425 11.0376 5.18506 11.2166 5.29472C11.4184 5.4184 11.5914 5.59135 11.9373 5.93726L12.0627 6.06274C12.4086 6.40865 12.5816 6.5816 12.7834 6.70528C12.9624 6.81494 13.1575 6.89575 13.3615 6.94474C13.5917 7 13.8363 7 14.3255 7H17.8C18.9201 7 19.4802 7 19.908 7.21799C20.2843 7.40973 20.5903 7.71569 20.782 8.09202C21 8.51984 21 9.0799 21 10.2V15.8C21 16.9201 21 17.4802 20.782 17.908C20.5903 18.2843 20.2843 18.5903 19.908 18.782C19.4802 19 18.9201 19 17.8 19H6.2C5.07989 19 4.51984 19 4.09202 18.782C3.71569 18.5903 3.40973 18.2843 3.21799 17.908C3 17.4802 3 16.9201 3 15.8V8.2Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Arquivo
      </label>
      <p id="fileName">Nenhum arquivo selecionado</p>
      <button id="submit-button" title="Enviar imagem para tela inicial">Enviar
        <svg width="31px" height="31px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.5003 12H5.41872M5.24634 12.7972L4.24158 15.7986C3.69128 17.4424 3.41613 18.2643 3.61359 18.7704C3.78506 19.21 4.15335 19.5432 4.6078 19.6701C5.13111 19.8161 5.92151 19.4604 7.50231 18.7491L17.6367 14.1886C19.1797 13.4942 19.9512 13.1471 20.1896 12.6648C20.3968 12.2458 20.3968 11.7541 20.1896 11.3351C19.9512 10.8529 19.1797 10.5057 17.6367 9.81135L7.48483 5.24303C5.90879 4.53382 5.12078 4.17921 4.59799 4.32468C4.14397 4.45101 3.77572 4.78336 3.60365 5.22209C3.40551 5.72728 3.67772 6.54741 4.22215 8.18767L5.24829 11.2793C5.34179 11.561 5.38855 11.7019 5.407 11.8459C5.42338 11.9738 5.42321 12.1032 5.40651 12.231C5.38768 12.375 5.34057 12.5157 5.24634 12.7972Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="js/ajustarIMG.js"></script>
  <script src="js/salvarBMP.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
